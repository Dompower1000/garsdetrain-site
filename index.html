<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gars de train</title>
  <meta name="description" content="Boutique Gars de train" />
  <style>
    :root {
      --bg: #0e0e11;
      --panel: #18181c;
      --panel-2: #111114;
      --text: #f5f5f7;
      --muted: #b8b8c2;
      --accent: #ef3b4a;
      --accent-hover: #d92c3b;
      --border: #2a2a31;
      --radius: 14px;
      --shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
      --max-width: 1180px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .site-header__inner,
    .container {
      width: min(100% - 32px, var(--max-width));
      margin: 0 auto;
    }

    .site-header__inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 0;
    }

    .brand {
      font-size: 1.95rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .brand small {
      display: block;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 400;
      margin-top: 4px;
</html>
